
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carta Especial</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:linear-gradient(#fdf7ec,#f6ead3);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Georgia,serif;
overflow:hidden;
}

.container{
position:relative;
width:320px;
height:420px;
cursor:pointer;
}

.envelope{
position:absolute;
bottom:0;
width:100%;
height:220px;
background:#e8d1a3;
border:3px solid #b88b3a;
border-radius:8px;
overflow:hidden;
z-index:3;
}

.tampa{
position:absolute;
top:0;
left:0;
width:100%;
height:120px;
background:#edd8b2;
clip-path:polygon(0 0,100% 0,50% 100%);
transition:.7s;
transform-origin:top;
border-bottom:2px solid #b88b3a;
}

.carta{
position:absolute;
left:50%;
bottom:40px;
transform:translateX(-50%);
width:260px;
height:340px;
background:#fffaf2;
border:2px solid #caa45d;
border-radius:8px;
padding:20px;
text-align:center;
transition:.8s;
z-index:2;
}

.container.abrir .carta{
transform:translate(-50%,-170px);
}

.container.abrir .tampa{
transform:rotateX(180deg);
}

h2{
color:#9b6b26;
margin-bottom:20px;
}

p{
font-size:17px;
line-height:1.5;
color:#5f4630;
}

.ass{
margin-top:25px;
font-style:italic;
}

.info{
position:absolute;
bottom:-45px;
width:100%;
text-align:center;
color:#8b6b36;
font-size:15px;
}
</style>
</head>

<body>

<div class="container" onclick="abrirCarta()" id="carta">

<div class="carta">
<h2>Cristina,</h2>

<p>
Quero te pedir desculpas por aquele dia.<br><br>

Eu me arrependo muito do que eu disse e nunca foi minha intenção te machucar.<br><br>

Espero que um dia você consiga entender meu coração.
</p>

<p class="ass">
Com carinho,<br>
Kaiky Andrey
</p>

</div>

<div class="envelope">
<div class="tampa"></div>
</div>

<div class="info">
💌 Clique no envelope
</div>

</div>

<script>
function abrirCarta(){
document.getElementById("carta").classList.toggle("abrir");
}
</script>

</body>
</html>
